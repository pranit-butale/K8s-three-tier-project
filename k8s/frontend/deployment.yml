apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend-app
        ports:
        - containerPort: 80